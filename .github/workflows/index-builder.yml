name: Index Builder

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**/*.yml'
      - 'apps/**/*.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Generate API JSON
        run: |
          python scripts/generate_api.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/BugeStudioTeam/Buge-Store-API.git
          git add api/v1/
          git diff --staged --quiet || git commit -m "chore: update API index [skip ci]"
          git push